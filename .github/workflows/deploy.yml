name: CI/CD Deployment to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: |
            GH_PAT=${{ secrets.GH_PAT }}
          script: |
            # Check and install Docker if missing
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing Docker..."
              sudo apt-get update -y
              sudo apt-get install -y docker.io docker-compose-v2
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            fi

            # Navigate to the project directory
            REPO_NAME="Legalhub-deployment"
            if [ ! -d "$HOME/$REPO_NAME" ]; then
              echo "Cloning repository..."
              git clone https://$GH_PAT@github.com/marveloussystem0-design/$REPO_NAME.git $HOME/$REPO_NAME
            fi
            
            cd $HOME/$REPO_NAME
            
            # Update remote URL with PAT and pull
            git remote set-url origin https://$GH_PAT@github.com/marveloussystem0-design/$REPO_NAME.git
            git pull origin main
            
            # Create .env files from secrets 
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > .env
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env
            echo "NEXT_PUBLIC_APP_URL=http://${{ secrets.EC2_HOST }}" >> .env
            echo "NEXT_PUBLIC_ENCRYPTION_SALT=${{ secrets.NEXT_PUBLIC_ENCRYPTION_SALT }}" >> .env
            echo "CRON_SECRET=${{ secrets.CRON_SECRET }}" >> .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env

            # (Web folder .env for Next.js Build context)
            mkdir -p web
            cp .env web/.env.local
            
            # Rebuild and restart containers
            sudo docker compose down
            sudo docker compose up --build -d
            
            # Clean up old images to save space on EC2
            sudo docker image prune -f
            
            # Diagnostic Status Check
            echo "--- DEPLOYMENT STATUS ---"
            sudo docker compose ps
            echo "--- RECENT WEB LOGS ---"
            sudo docker compose logs web --tail 20
